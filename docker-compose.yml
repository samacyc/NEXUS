version: '3.8'

services:
  # Backend API (using MongoDB Atlas)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logistics-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb+srv://ismailzine63_db_user:SiXSKTASXV44gRO2@cluster0.fxuudfm.mongodb.net
      - NODE_ENV=production
    networks:
      - logistics-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./LOGISTIC
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:4000/api
    container_name: logistics-frontend
    restart: unless-stopped
    ports:
      - "4001:80"
    depends_on:
      - backend
    networks:
      - logistics-network

networks:
  logistics-network:
    driver: bridge
